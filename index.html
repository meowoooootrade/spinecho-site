<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Items</title>
  <style>
    /* Minimal, framework-free styling */
    body { font-family: system-ui, sans-serif; margin: 24px; }
    .controls { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 16px; }
    input, select, button { padding: 6px 8px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px,1fr)); gap: 12px; }
    .card { border: 1px solid #ddd; border-radius: 12px; padding: 12px; }
    .title { font-weight: 700; margin: 0 0 6px; }
    .meta { color: #666; font-size: 0.9em; margin-bottom: 8px; }
    .tags { display: flex; gap: 6px; flex-wrap: wrap; }
    .tag { font-size: 0.8em; border: 1px solid #aaa; border-radius: 999px; padding: 2px 8px; }
  </style>
</head>
<body>
  <h1>Items</h1>

  <!-- Controls: search, sort, category filter -->
  <div class="controls">
    <input id="q" placeholder="Search (title, tags, category, notes)" />
    <select id="sort" aria-label="Sort">
      <option value="date_desc">Date ↓ (default)</option>
      <option value="date_asc">Date ↑</option>
      <option value="title_asc">Title A→Z</option>
      <option value="title_desc">Title Z→A</option>
    </select>
    <select id="category" aria-label="Category filter">
      <option value="">All categories</option>
    </select>
    <button id="clear" type="button">Clear</button>
  </div>

  <!-- Rendered list -->
  <div id="list" class="grid"></div>

  <script>
    // App state (raw items and filtered view)
    const state = { items: [], filtered: [] };

    // Helpers
    const lower = s => (s || "").toString().toLowerCase();
    const cmpStr = (a,b) => a.localeCompare(b, 'en');

    // Client-side sorting; server/build already outputs sorted JSON,
    // but client sorting is useful when users change sort mode.
    function applySort(items, mode) {
      const arr = items.slice();
      if (mode === 'date_desc') {
        arr.sort((a,b) => (b.date||'').localeCompare(a.date||'') || cmpStr(a.title||'', b.title||''));
      } else if (mode === 'date_asc') {
        arr.sort((a,b) => (a.date||'').localeCompare(b.date||'') || cmpStr(a.title||'', b.title||''));
      } else if (mode === 'title_asc') {
        arr.sort((a,b) => cmpStr(a.title||'', b.title||''));
      } else if (mode === 'title_desc') {
        arr.sort((a,b) => cmpStr(b.title||'', a.title||''));
      }
      return arr;
    }

    // Render list into cards
    function render(items) {
      const root = document.getElementById('list');
      root.innerHTML = '';
      items.forEach(it => {
        const card = document.createElement('div');
        card.className = 'card';

        const title = document.createElement('h3');
        title.className = 'title';
        if (it.url) {
          const a = document.createElement('a');
          a.href = it.url;
          a.target = '_blank';
          a.rel = 'noopener';
          a.textContent = it.title || '(no title)';
          title.appendChild(a);
        } else {
          title.textContent = it.title || '(no title)';
        }

        const meta = document.createElement('div');
        meta.className = 'meta';
        meta.textContent = [it.date, it.category].filter(Boolean).join(' · ');

        const tags = document.createElement('div');
        tags.className = 'tags';
        (it.tags || []).forEach(t => {
          const chip = document.createElement('span');
          chip.className = 'tag';
          chip.textContent = t;
          tags.appendChild(chip);
        });

        const notes = document.createElement('div');
        notes.textContent = it.notes || '';

        card.appendChild(title);
        card.appendChild(meta);
        if ((it.tags||[]).length) card.appendChild(tags);
        if (it.notes) card.appendChild(notes);
        root.appendChild(card);
      });
    }

    // Filtering + sorting pipeline
    function filterAndRender() {
      const q = lower(document.getElementById('q').value);
      const cat = document.getElementById('category').value;
      const sort = document.getElementById('sort').value;

      let arr = state.items.filter(it => {
        if (cat && (it.category || '') !== cat) return false;
        if (!q) return true;
        const haystack = [
          it.title, it.category, (it.tags||[]).join(' '), it.notes
        ].map(lower).join(' ');
        return haystack.includes(q);
      });

      arr = applySort(arr, sort);
      state.filtered = arr;
      render(arr);
    }

    // Initialize app
    async function init() {
      // Bust CDN cache on GitHub Pages by adding a unique query param
      const url = `data/items.json?v=${Date.now()}`;
      const res = await fetch(url, { cache: 'no-store' });
      state.items = await res.json();

      // Build category dropdown dynamically
      const categories = Array.from(new Set(state.items
        .map(it => it.category)
        .filter(Boolean)
      )).sort(cmpStr);
      const sel = document.getElementById('category');
      categories.forEach(c => {
        const op = document.createElement('option');
        op.value = c; op.textContent = c;
        sel.appendChild(op);
      });

      filterAndRender();
    }

    // Wire events
    ['q','sort','category'].forEach(id => {
      document.getElementById(id).addEventListener('input', filterAndRender);
      document.getElementById(id).addEventListener('change', filterAndRender);
    });
    document.getElementById('clear').addEventListener('click', () => {
      document.getElementById('q').value = '';
      document.getElementById('sort').value = 'date_desc';
      document.getElementById('category').value = '';
      filterAndRender();
    });

    // Kick off
    init();
  </script>
</body>
</html>
