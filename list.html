<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Spin Echo — List</title>
  <link rel="stylesheet" href="assets/css/site.css" />
</head>
<body>
  <header class="header">
    <button class="menu-btn" data-menu aria-label="Menu">☰</button>
    <div>Spin Echo</div>
  </header>

  <div class="shell">
    <aside class="sidebar">
      <h2 class="brand">Spin Echo</h2>
      <p class="status">States: Open (Reply will be delayed due to work)</p>
      <nav class="nav">
        <a href="./list.html">LIST</a>
        <a href="./wants.html">WANTS</a>
        <a href="./contact.html">CONTACT</a>
      </nav>
    </aside>

    <main class="main" style="padding:24px">
      <h1 style="margin:0 0 8px">List</h1>
      <div class="controls">
        <input id="q" placeholder="Search (title, tags, category, notes)" />
        <select id="sort" aria-label="Sort">
          <option value="date_desc">Date ↓ (default)</option>
          <option value="date_asc">Date ↑</option>
          <option value="title_asc">Title A→Z</option>
          <option value="title_desc">Title Z→A</option>
        </select>
        <select id="category" aria-label="Category filter">
          <option value="">All categories</option>
        </select>
        <button id="clear" type="button">Clear</button>
      </div>
      <div id="list" class="grid"></div>
    </main>
  </div>

  <script>
    // === same client-side list logic (English comments) ===
    const state = { items: [], filtered: [] };
    const lower = s => (s || "").toString().toLowerCase();
    const cmpStr = (a,b) => a.localeCompare(b, 'en');
    function applySort(items, mode) {
      const a = items.slice();
      if (mode === 'date_desc') a.sort((x,y)=>(y.date||'').localeCompare(x.date||'')||cmpStr(x.title||'',y.title||''));
      else if (mode === 'date_asc') a.sort((x,y)=>(x.date||'').localeCompare(y.date||'')||cmpStr(x.title||'',y.title||''));
      else if (mode === 'title_asc') a.sort((x,y)=>cmpStr(x.title||'',y.title||''));
      else if (mode === 'title_desc') a.sort((x,y)=>cmpStr(y.title||'',x.title||''));
      return a;
    }
    function render(items){
      const root=document.getElementById('list'); root.innerHTML='';
      items.forEach(it=>{
        const card=document.createElement('div'); card.className='card';
        const h=document.createElement('h3'); h.className='title';
        if(it.url){ const a=document.createElement('a'); a.href=it.url; a.target='_blank'; a.rel='noopener'; a.textContent=it.title||'(no title)'; h.appendChild(a); }
        else { h.textContent=it.title||'(no title)'; }
        const meta=document.createElement('div'); meta.className='meta'; meta.textContent=[it.date,it.category].filter(Boolean).join(' · ');
        const tags=document.createElement('div'); tags.className='tags';
        (it.tags||[]).forEach(t=>{ const s=document.createElement('span'); s.className='tag'; s.textContent=t; tags.appendChild(s); });
        const notes=document.createElement('div'); notes.textContent=it.notes||'';
        card.append(h,meta); if((it.tags||[]).length) card.appendChild(tags); if(it.notes) card.appendChild(notes);
        root.appendChild(card);
      });
    }
    function filterAndRender(){
      const q=lower(document.getElementById('q').value);
      const cat=document.getElementById('category').value;
      const sort=document.getElementById('sort').value;
      let arr=state.items.filter(it=>{
        if(cat && (it.category||'')!==cat) return false;
        if(!q) return true;
        const hay=[it.title,it.category,(it.tags||[]).join(' '),it.notes].map(lower).join(' ');
        return hay.includes(q);
      });
      arr=applySort(arr,sort); state.filtered=arr; render(arr);
    }
    async function init(){
      const res=await fetch(`data/items.json?v=${Date.now()}`,{cache:'no-store'});
      state.items=await res.json();
      const cats=Array.from(new Set(state.items.map(it=>it.category).filter(Boolean))).sort(cmpStr);
      const sel=document.getElementById('category'); cats.forEach(c=>{ const o=document.createElement('option'); o.value=c; o.textContent=c; sel.appendChild(o); });
      filterAndRender();
    }
    ['q','sort','category'].forEach(id=>{
      document.getElementById(id).addEventListener('input',filterAndRender);
      document.getElementById(id).addEventListener('change',filterAndRender);
    });
    document.getElementById('clear').addEventListener('click',()=>{
      document.getElementById('q').value=''; document.getElementById('sort').value='date_desc'; document.getElementById('category').value=''; filterAndRender();
    });
    init();
  </script>
  <script src="assets/js/site.js"></script>
</body>
</html>
