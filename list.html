<!doctype html>
<html lang="en" data-theme="">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Spin Echo — List</title>

  <!-- Early theme apply to prevent flash -->
  <script>
    (function () {
      try {
        const stored = localStorage.getItem("theme");
        const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        const mode = stored || (prefersDark ? "dark" : "light");
        document.documentElement.dataset.theme = mode;
        var m = document.querySelector('meta[name="theme-color"]');
        if (!m) { m = document.createElement("meta"); m.name = "theme-color"; document.head.appendChild(m); }
        m.content = mode === "dark" ? "#1a2233" : "#f5fbfb";
      } catch (_) {}
    })();
  </script>

  <link rel="stylesheet" href="assets/css/site.css" />
  <meta name="color-scheme" content="light dark" />
</head>
<body>
  <header class="header">
    <button class="menu-btn" data-menu aria-label="Menu" aria-controls="sidebar" aria-expanded="false">☰</button>
    <div>Spin Echo</div>
    <button id="theme-toggle" class="theme-btn" aria-label="Toggle theme" title="Toggle theme">🌙</button>
  </header>

  <div class="shell">
    <aside id="sidebar" class="sidebar" role="navigation" aria-label="Primary" aria-hidden="true">
      <h2 class="brand">Spin Echo</h2>
      <p class="status">States: Open (Reply will be delayed due to work)</p>
      <nav class="nav">
        <a href="./index.html">TOP</a>
        <a href="./list.html" aria-current="page">LIST</a>
        <a href="./wants.html">WANTS</a>
        <a href="./contact.html">CONTACT</a>
      </nav>
    </aside>

    <main class="main">
      <h1>List</h1>
      <div class="controls">
        <input id="q" placeholder="Search (title, tags, category, notes, cast)" aria-label="Search" />
        <select id="sort" aria-label="Sort">
          <option value="title_asc" selected>Title A→Z (default)</option>
          <option value="title_desc">Title Z→A</option>
          <option value="date_asc">Date old → new</option>
          <option value="date_desc">Date new → old</option>
        </select>
        <select id="category" aria-label="Category filter">
          <option value="">All categories</option>
        </select>
        <button id="clear" type="button" aria-label="Clear filters">Clear</button>
      </div>
      <div id="list" class="grid" aria-live="polite"></div>
    </main>
  </div>

  <script>
    // -------- utilities --------
    const state = { items: [], filtered: [] };
    const lower = s => (s || "").toString().toLowerCase();
    const cmpStr = (a,b) => (a||"").localeCompare(b||"", 'en');
    const debounce = (fn, ms) => { let t; return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), ms); }; };

    // Human-friendly date formatting for partial ISO strings
    function formatNiceDate(iso){
      if (!iso) return "";
      const parts = iso.split("-");
      const y = parts[0] || "";
      const m = parts[1] || "00";
      const d = parts[2] || "00";
      if (m === "00") return y;
      if (d === "00") {
        const monthNames = ["January","February","March","April","May","June","July","August","September","October","November","December"];
        const mi = parseInt(m,10)-1;
        return (mi>=0 && mi<12) ? `${monthNames[mi]}, ${y}` : y;
      }
      const obj = new Date(`${y}-${m}-${d}`);
      return isNaN(obj) ? iso : obj.toLocaleDateString("en-US", { year:"numeric", month:"short", day:"numeric" });
    }

    function titleSortKey(title) {
      let s = (title || "").trim();

      s = s.replace(/^[\s"'“”‘’()[\]\-.,!?:;]+/, "");

      s = s.replace(/^&\s*/, "");

      s = s.replace(/^(?:a|an|the|el|la|les|le|los|las|il|lo)\b[\s]+/i, "");

      s = s.replace(/^l['’]\s*/i, "");

      return s.toLowerCase();
    }

    // Sorting: title asc/desc, date asc/desc (fallbacks chained)
    function applySort(items, mode) {
      const a = items.slice();

      const cmpTitleAsc  = (x, y) => {
        const kx = titleSortKey(x.title);
        const ky = titleSortKey(y.title);
        const c = kx.localeCompare(ky, 'en');
        return c !== 0 ? c : (x.title || "").localeCompare(y.title || "", 'en');
      };

      const cmpTitleDesc = (x, y) => {
        const kx = titleSortKey(x.title);
        const ky = titleSortKey(y.title);
        const c = ky.localeCompare(kx, 'en');
        return c !== 0 ? c : (y.title || "").localeCompare(x.title || "", 'en');
      };

      const cmpDateAsc   = (x,y) => (x.date || '').localeCompare(y.date || '');
      const cmpDateDesc  = (x,y) => (y.date || '').localeCompare(x.date || '');

      if (mode === 'title_asc')      a.sort((x,y) => cmpTitleAsc(x,y)  || cmpDateAsc(x,y));
      else if (mode === 'title_desc')a.sort((x,y) => cmpTitleDesc(x,y) || cmpDateAsc(x,y));
      else if (mode === 'date_desc') a.sort((x,y) => cmpDateDesc(x,y)  || cmpTitleAsc(x,y));
      else if (mode === 'date_asc')  a.sort((x,y) => cmpDateAsc(x,y)   || cmpTitleAsc(x,y));
      return a;
    }

    // Encora URL
    const encoraUrl = id => `https://encora.it/recordings/${id}`;

    // Render cards (chunked to keep UI responsive)
    function render(items){
      const root = document.getElementById('list');
      root.innerHTML = '';

      const paint = (chunk) => {
        const frag = document.createDocumentFragment();
        chunk.forEach(it=>{
          const card = document.createElement('div'); card.className = 'card';

          // title: link to Encora when encora exists
          const h = document.createElement('h3'); h.className = 'title';
          if (it.encora) {
            const a = document.createElement('a');
            a.href = encoraUrl(it.encora);
            a.target = '_blank';
            a.rel = 'noopener';
            a.textContent = it.title || '(no title)';
            h.appendChild(a);
          } else {
            h.textContent = it.title || '(no title)';
          }
          card.appendChild(h);

          // production (top row)
          if (it.production) {
            const metaTop = document.createElement('div'); metaTop.className = 'meta';
            metaTop.textContent = it.production;
            card.appendChild(metaTop);
          }

          // date + master (same line)
          const meta = document.createElement('div'); meta.className = 'meta';
          const niceDate = it.niceDate || formatNiceDate(it.date);
          const rightBits = [niceDate, it.master].filter(Boolean).join(' · ');
          if (rightBits) { meta.textContent = rightBits; card.appendChild(meta); }

          // chips: url (as tag) / format / tags[]
          const chips = document.createElement('div'); chips.className = 'tags';
          if (it.category){
            const c = document.createElement('span');
            c.className = 'tag tag--category';
            c.textContent = it.category;
            chips.appendChild(c);
          }
          if (it.url){
            const u = document.createElement('span'); u.className = 'tag';
            u.textContent = it.url; chips.appendChild(u);
          }
          if (it.format){
            const f = document.createElement('span'); f.className = 'tag';
            f.textContent = it.format; chips.appendChild(f);
          }
          (it.tags || []).forEach(t => {
            const s = document.createElement('span'); s.className = 'tag';
            s.textContent = t; chips.appendChild(s);
          });
          if (chips.children.length) card.appendChild(chips);

          // cast / notes
          const hasCast  = !!it.cast;
          const hasNotes = !!it.notes;

          if (hasCast) {
            const el = document.createElement('div');
            el.className = 'desc';
            el.textContent = it.cast;
            card.appendChild(el);
          }

          if (hasCast && hasNotes) {
            const sep = document.createElement('hr');
            sep.className = 'sep';
            sep.setAttribute('role', 'separator');
            sep.setAttribute('aria-orientation', 'horizontal');
            card.appendChild(sep);
          }

          if (hasNotes) {
            const el = document.createElement('div');
            el.className = 'desc';
            el.textContent = it.notes;
            card.appendChild(el);
          }

          frag.appendChild(card);
        });
        root.appendChild(frag);
      };

      const chunkSize = 40;
      if (items.length <= chunkSize) {
        paint(items);
      } else {
        paint(items.slice(0, chunkSize));
        const rest = items.slice(chunkSize);
        (window.requestIdleCallback || window.requestAnimationFrame)(() => paint(rest));
      }
    }

    // Query tokenizer: multiple words and quoted phrases
    function tokenize(q){
      if (!q) return [];
      const out = [];
      const re = /"([^"]+)"|(\S+)/g;
      let m;
      while ((m = re.exec(q))) out.push((m[1] || m[2]).toLowerCase());
      return out;
    }

    // Build searchable haystack per item (cached on the object)
    function buildSearchText(it){
      const rawDate = it.date || "";
      const nice = it.niceDate || formatNiceDate(it.date);
      const year = rawDate.slice(0,4);
      const yearMonth = rawDate.slice(0,7);
      const parts = [
        it.title, it.master, it.production, it.category, it.format,
        (it.tags || []).join(" "),
        it.url || "", it.encora || "",
        it.notes, it.cast,
        rawDate, year, yearMonth, nice
      ];
      return parts.filter(Boolean).join(" ").toLowerCase();
    }

    function filterAndRender(){
      const q     = document.getElementById('q').value;
      const terms = tokenize(q);
      const cat   = document.getElementById('category').value;
      const sort  = document.getElementById('sort').value;

      let arr = state.items.filter(it=>{
        if (cat && (it.category || '') !== cat) return false;
        if (!terms.length) return true;
        if (!it._hay) it._hay = buildSearchText(it);
        const hay = it._hay;
        return terms.every(t => hay.includes(t)); // AND match
      });

      arr = applySort(arr, sort);
      state.filtered = arr;
      render(arr);
    }

    async function init(){
      // fetch manifest, then hashed items file
      const man = await fetch('data/manifest.json', { cache:'no-store' }).then(r=>r.json());
      const res = await fetch(`data/${man.items}`, { cache:'force-cache' });
      state.items = await res.json();

      // init category options (e.g., video/audio)
      const cats = Array.from(new Set(state.items.map(it=>it.category).filter(Boolean))).sort(cmpStr);
      const sel = document.getElementById('category');
      cats.forEach(c => { const o=document.createElement('option'); o.value=c; o.textContent=c; sel.appendChild(o); });

      filterAndRender();
    }

    // wire events (debounced search)
    const debouncedFilter = debounce(filterAndRender, 250);
    document.getElementById('q').addEventListener('input', debouncedFilter);
    document.getElementById('sort').addEventListener('change', filterAndRender);
    document.getElementById('category').addEventListener('change', filterAndRender);
    document.getElementById('clear').addEventListener('click', ()=>{
      document.getElementById('q').value='';
      document.getElementById('sort').value='title_asc';
      document.getElementById('category').value='';
      filterAndRender();
    });

    init();
  </script>

  <!-- Defer site-wide JS (menu/theme) -->
  <script src="assets/js/site.js" defer></script>

  <noscript>
    <style>
      #sidebar { position: static; transform: none !important; width: auto; height: auto; }
      .overlay { display: none !important; }
    </style>
  </noscript>
</body>
</html>
