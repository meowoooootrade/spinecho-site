name: Build data JSON

on:
  push:
    branches: [ main ]
    paths:
      - 'data/items.csv'
      - 'scripts/**'
      - '.github/workflows/build.yml'
  workflow_dispatch:

# <<< IMPORTANT: allow this workflow to push commits >>>
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # keep credentials so that "git push" uses GITHUB_TOKEN
          persist-credentials: true
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build items.json
        run: |
          python scripts/build_json.py

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # Explicitly set tokenized remote URL (robust against some org settings)
      - name: Set authenticated remote
        run: |
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/meowoooootrade/spinecho.git

      - name: Commit & push generated files
        run: |
          git add data/items.json data/items.sorted.csv || true
          if ! git diff --cached --quiet; then
            git commit -m "chore: rebuild items.json"
            git push origin HEAD:main
          fi
