name: Build data JSON (PR)

on:
  push:
    branches: [ main ]
    paths:
      - 'data/items.csv'
      - 'scripts/**'
      - '.github/workflows/build.yml'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build items.json
        run: |
          python scripts/build_json.py

      - name: Commit changes to a new branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          BRANCH="data/rebuild-$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH"
          git add data/items.json data/items.sorted.csv || true
          if ! git diff --cached --quiet; then
            git commit -m "chore: rebuild items.json"
            git push -u origin "$BRANCH"
          else
            echo "No changes; skipping push."
          fi

      - name: Create Pull Request
        if: success()
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ steps.branch.outputs.name || '' }}
          title: "chore: rebuild items.json"
          body: "Auto-generated by GitHub Actions."
          base: main
