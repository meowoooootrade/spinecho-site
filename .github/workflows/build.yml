name: Build items.json

on:
  push:
    paths:
      - "data/items.csv"
      - "scripts/build_items.py"
  workflow_dispatch:

# Needed for PR creation with GITHUB_TOKEN
permissions:
  contents: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build JSON & indexes
        run: |
          python scripts/build_items.py

      # Create a PR with the generated artifacts
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: main
          branch: data/rebuild-${{ github.run_id }}
          title: "chore(data): rebuild items json & indexes"
          body: "Auto-generated by GitHub Actions."
          commit-message: "chore(data): rebuild items json & indexes"
          add-paths: |
            data/*.json
            data/items.sorted.csv
          delete-branch: true
          # optional: set committer/author shown on the PR commit(s)
          committer: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
          author: meowoooootrade <230661735+meowoooootrade@users.noreply.github.com>
