name: Build items.json

on:
  push:
    paths:
      - "data/items.csv"          # Rebuild when the source CSV changes
      - "scripts/build_json.py"  # Rebuild when the builder script changes
  workflow_dispatch:              # Manual run

# Required for PR creation using GITHUB_TOKEN
permissions:
  contents: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Quick sanity check to verify paths and Python availability
      - name: Debug environment
        run: |
          pwd
          which python
          python --version
          ls -la
          ls -la scripts || true
          ls -la data || true

      # Build JSON, manifest, indexes, and sorted CSV
      - name: Build JSON & indexes
        run: |
          python scripts/build_json.py

      # Create or update a pull request with generated artifacts
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: main
          branch: data/rebuild-${{ github.run_id }}
          title: "chore(data): rebuild items json & indexes"
          body: "Auto-generated by GitHub Actions."
          commit-message: "chore(data): rebuild items json & indexes"
          add-paths: |
            data/*.json
            data/items.sorted.csv
          delete-branch: true
          committer: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
          author: meowoooootrade <230661735+meowoooootrade@users.noreply.github.com>
