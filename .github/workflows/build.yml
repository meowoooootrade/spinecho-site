name: Build data JSON (PR)

on:
  push:
    branches: [ main ]
    paths:
      - 'data/items.csv'
      - 'scripts/**'
      - '.github/workflows/build.yml'
  workflow_dispatch:

# IMPORTANT: allow this workflow to push commits and open PRs
permissions:
  contents: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build items.json
        run: |
          python scripts/build_json.py

      # 👉 Do NOT create branches or commit manually here.
      #    Let create-pull-request handle commit/branch/PR.

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: main
          branch: data/rebuild-${{ github.run_id }}    # unique branch name per run
          title: "chore: rebuild items.json"
          body: "Auto-generated by GitHub Actions."
          commit-message: "chore: rebuild items.json"
          committer: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
          author: ${{ github.actor }} <${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com>
          add-paths: |              # ここで変更対象を明示（ステージングは action に任せる）
            data/items.json
            data/items.sorted.csv
          draft: false
          delete-branch: true       # マージ後に自動削除（任意）
