name: Build items.json

on:
  push:
    paths:
      - "data/items.csv"
      - "tools/build_items.py"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build JSON & indexes
        run: |
          python tools/build_items.py

      - name: Commit artifacts
        uses: EndBug/add-and-commit@v9
        with:
          add: "data/*.json"
          message: "chore(data): rebuild items json & indexes"
          author_name: github-actions
          author_email: github-actions@users.noreply.github.com
